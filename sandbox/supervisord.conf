[unix_http_server]
file=/tmp/supervisor.sock   ; Path of UNIX socket file, supervisor uses it to listen
chmod=0770                  ; Socket file permissions
chown=ubuntu:ubuntu         ; Socket file owner and group

[supervisord]
logfile=/dev/stdout         ; Main log file output to standard output
logfile_maxbytes=0          ; No limit on log size
loglevel=info               ; Log level
pidfile=/tmp/supervisord.pid ; Path of pidfile
nodaemon=true                ; Need to run in foreground in Docker
minfds=1024                  ; Minimum value of open file descriptors
minprocs=200                 ; Minimum number of processes
autoshutdown=true            ; Auto exit after all services stop

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock ; Socket connection to supervisord

; Xvfb virtual display configuration
[program:xvfb]
command=bash -c "rm -f /tmp/.X1-lock && Xvfb :1 -screen 0 1280x1029x24"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DISPLAY=:1
user=ubuntu
priority=10

; Google Chrome configuration - optimized for stability, performance, and reduced bot detection
[program:chrome]
command=chromium --display=:1 --window-size=1280,1029 --start-maximized --disable-dev-shm-usage --disable-gpu --disable-gpu-sandbox --disable-software-rasterizer --disable-accelerated-2d-canvas --disable-accelerated-jpeg-decoding --disable-accelerated-mjpeg-decode --disable-accelerated-video-decode --no-first-run --no-default-browser-check --no-xshm --test-type --noerrdialogs --disable-session-crashed-bubble --hide-crash-restore-bubble --disable-features=WelcomeExperience,SigninPromo,TranslateUI,BlinkGenPropertyTrees,AudioServiceOutOfProcess,InfiniteSessionRestore --enable-features=NetworkService,NetworkServiceInProcess --disable-infobars --disable-notifications --disable-popup-blocking --disable-prompt-on-repost --disable-extensions --disable-component-extensions-with-background-pages --disable-background-networking --disable-background-timer-throttling --disable-backgrounding-occluded-windows --disable-breakpad --disable-client-side-phishing-detection --disable-default-apps --disable-domain-reliability --disable-hang-monitor --disable-ipc-flooding-protection --disable-renderer-backgrounding --disable-sync --disable-translate --metrics-recording-only --mute-audio --no-pings --password-store=basic --use-mock-keychain --force-color-profile=srgb --disable-blink-features=AutomationControlled --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" --lang=en-US --remote-debugging-address=0.0.0.0 --remote-debugging-port=8222 %(ENV_CHROME_ARGS)s
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DISPLAY=:1
user=ubuntu
priority=20
startretries=5
startsecs=5
stopwaitsecs=10

; socat port forwarding configuration
[program:socat]
command=socat TCP-LISTEN:9222,bind=0.0.0.0,fork,reuseaddr TCP:127.0.0.1:8222
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=ubuntu
priority=30
startsecs=2

; VNC service configuration
[program:x11vnc]
command=x11vnc -display :1 -nopw -shared -listen 0.0.0.0 -xkb -forever -rfbport 5900 -cursor arrow -nocursorshape -noxdamage -repeat -ncache 10 -ncache_cr
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DISPLAY=:1
user=ubuntu
priority=40
startsecs=3

; Websockify configuration - Convert VNC to WebSocket
[program:websockify]
command=websockify 0.0.0.0:5901 localhost:5900
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=ubuntu
priority=45
startsecs=3

; code-server (VS Code in the browser)
[program:code_server]
command=code-server --bind-addr 0.0.0.0:8081 --auth password --disable-telemetry --disable-update-check --user-data-dir /home/ubuntu/.code-server --extensions-dir /home/ubuntu/.code-server/extensions /workspace
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME=/home/ubuntu,PNPM_HOME=/home/ubuntu/.local/share/pnpm,PATH=/home/ubuntu/.local/share/pnpm:/usr/local/nvm/versions/node/v22.13.0/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
user=ubuntu
priority=46
startsecs=3

; FastAPI application configuration
[program:app]
command=uvicorn app.main:app --host 0.0.0.0 --port 8080 %(ENV_UVI_ARGS)s
directory=/app
user=ubuntu
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME=/home/ubuntu
priority=50

; Group configuration, can start or stop multiple programs at once
[group:services]
programs=xvfb,chrome,socat,x11vnc,websockify,code_server,app 
