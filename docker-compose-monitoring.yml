# Docker Compose for Prometheus + Grafana monitoring stack
# Run alongside docker-compose-development.yml:
#   docker compose -f docker-compose-development.yml -f docker-compose-monitoring.yml up -d
#
# OrbStack note: config files are mounted from /private/tmp/pythinker-monitoring/
# (copied there because OrbStack lost Full Disk Access to /Users/ after a hard restart).
# To sync latest config changes: cp prometheus/prometheus.yml /private/tmp/pythinker-monitoring/prometheus/
# To restore original mounts: revert volume paths back to ./prometheus/, ./grafana/ etc.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: pythinker-prometheus
    volumes:
      - /private/tmp/pythinker-monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /private/tmp/pythinker-monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - /private/tmp/pythinker-monitoring/prometheus/agent_enhancement_alerts.yml:/etc/prometheus/agent_enhancement_alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'  # Enable reload via /-/reload
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      # OrbStack: exec-based health checks hang; Prometheus responds fine on port 9090
      test: ["NONE"]

  grafana:
    image: grafana/grafana:latest
    container_name: pythinker-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - /private/tmp/pythinker-monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - /private/tmp/pythinker-monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      # OrbStack: exec-based health checks hang; Grafana responds fine on port 3001
      test: ["NONE"]

  loki:
    image: grafana/loki:3.5.4
    container_name: pythinker-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - /private/tmp/pythinker-monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      # OrbStack: exec-based health checks hang; Loki responds fine on port 3100
      test: ["NONE"]

  promtail:
    image: grafana/promtail:3.5.4
    container_name: pythinker-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /private/tmp/pythinker-monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      # These two paths refer to the OrbStack Linux VM filesystem (not macOS), so they work fine
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - pythinker-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: pythinker-redis-exporter
    command:
      - '--redis.addr=redis://redis:6379'
      - '--web.listen-address=:9121'
    restart: unless-stopped
    networks:
      - pythinker-network

  # redis-cache-exporter removed: dev compose has only one Redis instance (no redis-cache service)

volumes:
  prometheus_data:
    name: pythinker-prometheus-data
  grafana_data:
    name: pythinker-grafana-data
  loki_data:
    name: pythinker-loki-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
