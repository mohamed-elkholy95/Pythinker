# =============================================================================
# Grafana Unified Alerting — Contact Points
# =============================================================================
# Configures WHERE alerts get sent (contact points / receivers).
# Routing, grouping, and mute timings are in notification_policies.yml.
#
# Supports:
#   - Webhook (for custom integrations, Discord, Slack incoming webhooks)
#   - Email (when SMTP is configured)
#
# To enable Discord/Slack:
#   Set GRAFANA_ALERT_WEBHOOK_URL env var to your webhook URL
#   Discord: https://discord.com/api/webhooks/...
#   Slack: https://hooks.slack.com/services/...
#
# Inhibition strategy (achieved via notification_policies.yml routing):
#   Grafana Unified Alerting does not support Alertmanager-style inhibition
#   rules. Instead, we achieve similar noise reduction through:
#
#   1. Root-cause routing: BackendDown, LLMLatencyCritical, and
#      RedisExporterDown are routed to dedicated high-priority routes
#      with short group_wait (10s) so the operator sees them first.
#
#   2. Symptom grouping: Downstream alerts (e.g., HighLLMErrorRate,
#      LLMErrorRateRising, LLMLatencyDegraded when LLM provider is down)
#      are grouped into a single notification using group_by: ["..."]
#      so they arrive as one bundle, not N separate pages.
#
#   3. Mute timings: During scheduled maintenance, symptom routes are
#      muted while root-cause and self-monitoring routes remain active.
#
#   Mapping to the original inhibition requirements:
#     LLMLatencyCritical fires  -> LLM symptom group absorbs:
#                                  HighLLMErrorRate, LLMErrorRateRising,
#                                  LLMLatencyDegraded, SlowLLMLatency,
#                                  RecoveryBudgetExhausted, TokenConsumptionSpike
#     BackendDown fires         -> All non-monitoring alerts grouped by default
#                                  route; self-monitoring route stays independent
#     RedisExporterDown fires   -> Redis symptom group absorbs:
#                                  RedisHighMemoryUsage, RedisEvictionSpike,
#                                  RedisOperationFailures, RateLimitFallbackActive
# =============================================================================

apiVersion: 1

contactPoints:
  # ─────────────────────────────────────────────────────────────────────────
  # Primary: Backend webhook — custom alert processing and forwarding
  # ─────────────────────────────────────────────────────────────────────────
  - orgId: 1
    name: pythinker-webhook
    receivers:
      - uid: pythinker-webhook-receiver
        type: webhook
        settings:
          url: "http://backend:8000/api/v1/webhooks/grafana-alert"
          httpMethod: POST
          maxAlerts: 10
        disableResolveMessage: false

  # ─────────────────────────────────────────────────────────────────────────
  # Fallback: Loki log sink — ensures critical alerts are captured even
  # when the backend is unreachable
  # ─────────────────────────────────────────────────────────────────────────
  # Grafana logs all notification attempts to its own container log,
  # which Promtail captures into Loki. This receiver uses a secondary webhook
  # to Loki's push API so critical alerts are directly written as log entries
  # even if the backend webhook endpoint is unreachable.
  - orgId: 1
    name: pythinker-loki-fallback
    receivers:
      - uid: pythinker-loki-fallback-receiver
        type: webhook
        settings:
          url: "http://loki:3100/loki/api/v1/push"
          httpMethod: POST
          maxAlerts: 5
          # Loki won't parse Grafana's JSON as a valid push request, but
          # Grafana logs the attempt including the alert details to its own
          # stdout — which Promtail captures. This ensures alerting activity
          # is always visible in Loki even if the backend is down.
        disableResolveMessage: true
