# SearXNG Production Settings for Pythinker Agent
# Optimized for reliability, performance, and English-language results
# See: https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

general:
  instance_name: "Pythinker Search"
  debug: false
  privacypolicy_url: ""
  contact_url: ""
  enable_metrics: true  # Enable for monitoring engine health

search:
  safe_search: 0
  autocomplete: "duckduckgo"  # Use DuckDuckGo for autocomplete
  autocomplete_min: 2
  default_lang: "en"
  languages:
    - en
    - en-US
    - en-GB
  formats:
    - html
    - json  # Enable JSON API for programmatic access
  # Ban time for misbehaving engines (in seconds)
  ban_time_on_fail: 30
  # Maximum ban time
  max_ban_time_on_fail: 300

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "pythinker-searxng-secret-key-change-in-production"
  limiter: false  # Disable rate limiting for internal agent use
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: auto

# Engine Configuration - Prioritize stable, reliable engines
# Engines are selected based on reliability testing and error rates
engines:
  # === PRIMARY ENGINES (Most Reliable) ===

  # DuckDuckGo - Very stable, good privacy, reliable API
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    timeout: 4.0
    weight: 1.2  # Higher weight = higher priority in results

  # Brave Search - Modern, reliable, good results
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    timeout: 4.0
    weight: 1.1

  # Qwant - European search, reliable API
  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
    timeout: 4.0
    weight: 1.0

  # Mojeek - Independent index, stable
  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false
    timeout: 4.0
    weight: 0.9

  # === SECONDARY ENGINES (Specialized) ===

  # Wikipedia - Essential for factual information
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false
    language: en
    timeout: 3.0
    weight: 1.0

  # Wikidata - Structured data
  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false
    timeout: 3.0

  # GitHub - Code search
  - name: github
    engine: github
    shortcut: gh
    disabled: false
    timeout: 5.0

  # Arxiv - Academic papers
  - name: arxiv
    engine: arxiv
    shortcut: ar
    disabled: false
    timeout: 5.0

  # Stack Overflow - Not available in this SearXNG version
  # Use stackexchange instead which covers all SE sites
  - name: stackexchange
    engine: stackexchange
    shortcut: stx
    disabled: false
    timeout: 4.0
    categories: it

  # === PROBLEMATIC ENGINES (Disabled due to API issues) ===

  # Bing - DISABLED: "Expected results to start at 1" parsing errors
  # Known issue with Bing API response format changes
  - name: bing
    engine: bing
    shortcut: b
    disabled: true  # DISABLED - unreliable API responses

  # Google - DISABLED: Aggressive rate limiting and CAPTCHAs
  - name: google
    engine: google
    shortcut: g
    disabled: true  # DISABLED - rate limiting issues

  # === EXPLICITLY DISABLED (Regional/Unreliable) ===

  - name: baidu
    engine: baidu
    disabled: true

  - name: sogou
    engine: sogou
    disabled: true

  - name: yandex
    engine: yandex
    disabled: true

  # Ahmia/Torch - Tor engines, not needed
  - name: ahmia
    disabled: true

  - name: torch
    disabled: true

outgoing:
  # Robust timeout and retry settings for production
  request_timeout: 5.0
  max_request_timeout: 15.0
  useragent_suffix: "Pythinker/1.0"
  pool_connections: 100
  pool_maxsize: 20
  # Enable HTTP/2 for better performance
  enable_http2: true
  # Retry on specific HTTP errors
  retries: 2
  retry_on_http_error: true

# Redis caching for improved performance (if redis available)
redis:
  url: redis://redis:6379/0
  cache_expire: 1800
