name: Documentation Change
description: Suggest improvements or report issues with documentation
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve our documentation! Describe what needs to change below.

  - type: textarea
    id: what
    attributes:
      label: What documentation needs to change?
      description: Describe which section, page, or file needs updating.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current State
      description: What does the documentation currently say (or what is missing)?
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested Change
      description: Describe the improvement or correction needed.
    validations:
      required: true

  - type: checkboxes
    id: reason
    attributes:
      label: Why This Change?
      options:
        - label: Incorrect or outdated information
        - label: Missing documentation for an existing feature
        - label: Unclear or confusing explanation
        - label: New feature needs documentation
        - label: Typo or formatting issue

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, or references that support the change.
