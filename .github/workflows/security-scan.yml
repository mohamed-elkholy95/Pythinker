name: Security Scan

on:
  schedule:
    - cron: "0 0 * * 0"
  pull_request:
    branches: [main, main-dev]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "setuptools<82"
          pip install -r backend/requirements.txt
          pip install "pip-audit>=2.7.0"

      - name: Run pip-audit
        id: pip-audit
        continue-on-error: false
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit

      - name: Install Node dependencies
        working-directory: frontend
        run: bun install

      - name: Run npm audit
        id: npm-audit
        continue-on-error: false
        working-directory: frontend
        run: |
          bun pm trust || true
          npm audit --json > ../npm-audit-report.json || true
          npm audit

      - name: Upload audit reports
        uses: actions/upload-artifact@v7
        with:
          name: security-audit-reports
          path: |
            pip-audit-report.json
            npm-audit-report.json
          retention-days: 30

  container-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        image:
          - context: backend
            dockerfile: backend/Dockerfile
            name: pythinker-backend
          - context: frontend
            dockerfile: frontend/Dockerfile
            name: pythinker-frontend
          - context: sandbox
            dockerfile: sandbox/Dockerfile
            name: pythinker-sandbox
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        id: build
        continue-on-error: true
        run: |
          docker build \
            -f ${{ matrix.image.dockerfile }} \
            -t ${{ matrix.image.name }}:scan \
            ${{ matrix.image.context }}

      - name: Run Trivy vulnerability scanner
        if: steps.build.outcome == 'success'
        continue-on-error: false
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ matrix.image.name }}:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Run Trivy (SARIF output)
        if: steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ matrix.image.name }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.image.name }}.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        if: steps.build.outcome == 'success' && hashFiles(format('trivy-{0}.sarif', matrix.image.name)) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.image.name }}.sarif"
          category: "trivy-${{ matrix.image.name }}"

      - name: Skip notice
        if: steps.build.outcome != 'success'
        run: echo "::warning::Skipped Trivy scan — image build failed for ${{ matrix.image.name }}"
