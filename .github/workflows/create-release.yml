name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          # Matches everything between ## [X.Y.Z] and the next ## [ heading
          VERSION="${{ steps.version.outputs.version }}"
          SECTION=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d')

          if [ -z "$SECTION" ]; then
            SECTION="Release ${GITHUB_REF_NAME}"
          fi

          # Write to file to preserve newlines
          echo "$SECTION" > /tmp/release-notes.md

          # Append Docker pull commands
          OWNER="${{ github.repository_owner }}"
          {
            echo ""
            echo "---"
            echo ""
            echo "### Docker Images"
            echo ""
            echo "**GitHub Container Registry (ghcr.io):**"
            echo '```bash'
            echo "docker pull ghcr.io/${OWNER}/pythinker-frontend:${VERSION}"
            echo "docker pull ghcr.io/${OWNER}/pythinker-backend:${VERSION}"
            echo "docker pull ghcr.io/${OWNER}/pythinker-sandbox:${VERSION}"
            echo '```'
            echo ""
            echo "**Docker Hub:**"
            echo '```bash'
            echo "docker pull pythinker/pythinker-frontend:${VERSION}"
            echo "docker pull pythinker/pythinker-backend:${VERSION}"
            echo "docker pull pythinker/pythinker-sandbox:${VERSION}"
            echo '```'
            echo ""
            echo "**Quick start:**"
            echo '```bash'
            echo "IMAGE_TAG=${VERSION} docker compose -f docker-compose.yml up -d"
            echo '```'
          } >> /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            --latest
