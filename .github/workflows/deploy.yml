name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/test-and-lint.yml'
      - '.github/workflows/create-release.yml'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:
    inputs:
      force_build_all:
        description: 'Force build all images (ignore path filter)'
        type: boolean
        default: false
      sandbox_addons:
        description: 'Enable sandbox addons (code-server, etc.)'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/mohamed-elkholy95

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have file changes
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      gateway: ${{ steps.filter.outputs.backend }}
      deploy_config: ${{ steps.filter.outputs.deploy_config }}
      any_app: ${{ steps.check.outputs.any_app }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            sandbox:
              - 'sandbox/**'
            deploy_config:
              - 'docker-compose-deploy.yml'

      - name: Validate compose configs
        run: ./scripts/validate_compose_configs.sh

      - name: Check if any app service changed
        id: check
        run: |
          if [ "${{ steps.filter.outputs.backend }}" = "true" ] || \
             [ "${{ steps.filter.outputs.frontend }}" = "true" ] || \
             [ "${{ steps.filter.outputs.sandbox }}" = "true" ] || \
             [ "${{ steps.filter.outputs.deploy_config }}" = "true" ] || \
             [ "${{ inputs.force_build_all }}" = "true" ]; then
            echo "any_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_app=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build changed images and push to ghcr.io
  # ---------------------------------------------------------------------------
  build:
    needs: changes
    if: needs.changes.outputs.any_app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - component: backend
            changed: ${{ needs.changes.outputs.backend }}
            dockerfile: Dockerfile
          - component: frontend
            changed: ${{ needs.changes.outputs.frontend }}
            dockerfile: Dockerfile
          - component: sandbox
            changed: ${{ needs.changes.outputs.sandbox }}
            dockerfile: Dockerfile
          - component: gateway
            context: backend
            changed: ${{ needs.changes.outputs.gateway }}
            dockerfile: Dockerfile.gateway
    steps:
      - name: Skip unchanged component
        if: matrix.changed != 'true' && inputs.force_build_all != true
        run: echo "Skipping ${{ matrix.component }} — no changes detected"

      - name: Checkout code
        if: matrix.changed == 'true' || inputs.force_build_all == true
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: matrix.changed == 'true' || inputs.force_build_all == true
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        if: matrix.changed == 'true' || inputs.force_build_all == true
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: matrix.changed == 'true' || inputs.force_build_all == true
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/pythinker-${{ matrix.component }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set build date
        if: matrix.changed == 'true' || inputs.force_build_all == true
        id: build_date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: matrix.changed == 'true' || inputs.force_build_all == true
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.context || matrix.component }}
          file: ./${{ matrix.context || matrix.component }}/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            ENABLE_SANDBOX_ADDONS=${{ inputs.sandbox_addons == true && '1' || '0' }}
            DOCKER_GID=988
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  # ---------------------------------------------------------------------------
  # Deployment is handled by Dokploy (pulls pre-built images from GHCR).
  # The CI SSH deploy job was removed to prevent dual-stack volume conflicts.
  # See commit history for the original deploy job if restoration is needed.
  # ---------------------------------------------------------------------------
