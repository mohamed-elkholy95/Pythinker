name: Build and Push Docker Images

# Only build on version tags — never on push/PR (saves significant minutes)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_PREFIX: pythinker
  GHCR_REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      matrix:
        include:
          - component: frontend
            dockerfile: Dockerfile
          - component: backend
            dockerfile: Dockerfile
          - component: sandbox
            dockerfile: Dockerfile
          - component: gateway
            context: backend
            dockerfile: Dockerfile.gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine push targets
        id: push_targets
        run: |
          # ghcr.io always available (GITHUB_TOKEN)
          IMAGES="ghcr.io/${{ github.repository_owner }}/pythinker-${{ matrix.component }}"
          PUSH=true

          # Add Docker Hub if credentials are configured
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            IMAGES="${IMAGES},${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_PREFIX }}/pythinker-${{ matrix.component }}"
            echo "Docker Hub: enabled"
          else
            echo "Docker Hub: skipped (no credentials)"
          fi

          # metadata-action expects newline-separated images
          echo "images<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGES" | tr ',' '\n' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "push=$PUSH" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.push_targets.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set build date
        id: build_date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.context || matrix.component }}
          file: ./${{ matrix.context || matrix.component }}/${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ steps.push_targets.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || steps.build_date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
