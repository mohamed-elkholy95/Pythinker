name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please comment to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Please update your PR or comment if it is still in progress.
          close-issue-message: >
            This issue was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if the issue persists.
          close-pr-message: >
            This PR was closed because it has been stale for 14 days with no activity.
            Feel free to reopen if you would like to continue working on it.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "priority: critical,priority: high,status: in progress"
          exempt-pr-labels: "priority: critical,priority: high,status: in progress"
          exempt-all-milestones: true
          operations-per-run: 30
