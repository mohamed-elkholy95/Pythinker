# Dependabot configuration for Pythinker
# Keeps dependencies secure and up-to-date

version: 2
updates:
  # Python (pip) dependencies - Backend
    - package-ecosystem: "pip"
        directory: "/backend"
            schedule:
                  interval: "weekly"
                      labels:
                            - "dependencies"
                                  - "python"
                                      commit-message:
                                            prefix: "chore(deps)"

                                              # JavaScript (npm) dependencies - Frontend
                                                - package-ecosystem: "npm"
                                                    directory: "/frontend"
                                                        schedule:
                                                              interval: "weekly"
                                                                  labels:
                                                                        - "dependencies"
                                                                              - "javascript"
                                                                                  commit-message:
                                                                                        prefix: "chore(deps)"

                                                                                          # Docker dependencies
                                                                                            - package-ecosystem: "docker"
                                                                                                directory: "/"
                                                                                                    schedule:
                                                                                                          interval: "weekly"
                                                                                                              labels:
                                                                                                                    - "dependencies"
                                                                                                                          - "docker"
                                                                                                                              commit-message:
                                                                                                                                    prefix: "chore(deps)"
                                                                                                                                    
                                                                                                                                      # GitHub Actions
                                                                                                                                        - package-ecosystem: "github-actions"
                                                                                                                                            directory: "/"
                                                                                                                                                schedule:
                                                                                                                                                      interval: "weekly"
                                                                                                                                                          labels:
                                                                                                                                                                - "dependencies"
                                                                                                                                                                      - "ci"
                                                                                                                                                                          commit-message:
                                                                                                                                                                                prefix: "chore(deps)"
