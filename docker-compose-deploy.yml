# =============================================================================
# Pythinker — Production Deployment
# =============================================================================
#
# Single compose file that works ANYWHERE:
#
#   VPS (pre-built):   docker compose -f docker-compose-deploy.yml pull && \
#                      docker compose -f docker-compose-deploy.yml up -d
#
#   Local (from source): docker compose -f docker-compose-deploy.yml up --build -d
#
#   Pin version:       IMAGE_TAG=sha-abc1234 docker compose -f docker-compose-deploy.yml pull && up -d
#
# CI auto-deploys on push to main via SSH (see .github/workflows/deploy.yml).
# First-time VPS setup: ./scripts/vps-bootstrap.sh
#
# Routing: Traefik (Dokploy) → frontend:80 (nginx) → /api/* → backend:8000
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend — Nginx serving Vue 3 SPA
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/mohamed-elkholy95/pythinker-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    restart: always
    networks:
      - dokploy-network
      - pythinker-internal
    environment:
      - BACKEND_URL=http://backend:8000
    labels:
      # Traefik security headers middleware
      - "traefik.http.middlewares.pythinker-security-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.pythinker-security-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.pythinker-security-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.pythinker-security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.pythinker-security-headers.headers.customResponseHeaders.Permissions-Policy=camera=(), microphone=(), geolocation=(), payment=()"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ---------------------------------------------------------------------------
  # Backend — FastAPI + uvicorn
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/mohamed-elkholy95/pythinker-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      sandbox:
        condition: service_healthy
        restart: true
      mongodb:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      qdrant:
        condition: service_healthy
        restart: true
      minio-init:
        condition: service_completed_successfully
    restart: always
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - knowledge_base_data:/app/data/knowledge_bases
      - dspy_cache:/app/data/dspy_cache
    networks:
      - dokploy-network
      - pythinker-internal
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - SANDBOX_LIFECYCLE_MODE=${SANDBOX_LIFECYCLE_MODE:-static}
      - SANDBOX_ADDRESS=${SANDBOX_ADDRESS:-sandbox}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET}
      - GRPC_ENABLE_FORK_SUPPORT=0
      - NODE_OPTIONS=--no-deprecation
      - FAST_MODEL=${FAST_MODEL:-}
      - FEATURE_PROMPT_OPTIMIZATION_PIPELINE=${FEATURE_PROMPT_OPTIMIZATION_PIPELINE:-false}
      - DSPY_CACHEDIR=/app/data/dspy_cache
      - DSPY_NUM_THREADS=${DSPY_NUM_THREADS:-4}
      - DSPY_MAX_BOOTSTRAPPED_DEMOS=${DSPY_MAX_BOOTSTRAPPED_DEMOS:-4}
      - DSPY_MAX_LABELED_DEMOS=${DSPY_MAX_LABELED_DEMOS:-4}
      - DSPY_MINIBATCH_SIZE=${DSPY_MINIBATCH_SIZE:-25}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@pythinker-redis:6379/0
      - MONGODB_URI=mongodb://pythinker-mongodb:27017/${MONGODB_DATABASE:-pythinker}?authSource=admin&replicaSet=rs0
      - MONGODB_USERNAME=${MONGODB_ROOT_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - SANDBOX_CALLBACK_TOKEN=${SANDBOX_CALLBACK_TOKEN:-}
      - MINIO_ENDPOINT=pythinker-minio:9000
      - QDRANT_URL=http://pythinker-qdrant:6333
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Gateway — Telegram / Channel Integration (lightweight, no browser deps) — opt-in via: --profile channels
  # ---------------------------------------------------------------------------
  gateway:
    profiles: ["channels"]
    image: ghcr.io/mohamed-elkholy95/pythinker-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    command: ["python", "-m", "app.interfaces.gateway.gateway_runner"]
    depends_on:
      backend:
        condition: service_healthy
        restart: true
      mongodb:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      qdrant:
        condition: service_healthy
        restart: true
      minio-init:
        condition: service_completed_successfully
      sandbox:
        condition: service_healthy
        restart: true
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dspy_cache:/app/data/dspy_cache
    networks:
      - dokploy-network
      - pythinker-internal
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - CHANNEL_GATEWAY_ENABLED=true
      - SANDBOX_LIFECYCLE_MODE=${SANDBOX_LIFECYCLE_MODE:-static}
      - SANDBOX_ADDRESS=${SANDBOX_ADDRESS:-sandbox}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET}
      - GRPC_ENABLE_FORK_SUPPORT=0
      - NODE_OPTIONS=--no-deprecation
      - FAST_MODEL=${FAST_MODEL:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@pythinker-redis:6379/0
      - MONGODB_URI=mongodb://pythinker-mongodb:27017/${MONGODB_DATABASE:-pythinker}?authSource=admin&replicaSet=rs0
      - MONGODB_USERNAME=${MONGODB_ROOT_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - MINIO_ENDPOINT=pythinker-minio:9000
      - QDRANT_URL=http://pythinker-qdrant:6333

  # ---------------------------------------------------------------------------
  # Sandbox — Isolated Docker Execution Environment
  # ---------------------------------------------------------------------------
  sandbox:
    image: ghcr.io/mohamed-elkholy95/pythinker-sandbox:${IMAGE_TAG:-latest}
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        ENABLE_SANDBOX_ADDONS: "${ENABLE_SANDBOX_ADDONS:-0}"
    hostname: sandbox
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=./sandbox/seccomp-sandbox.hardened.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    shm_size: '${SANDBOX_SHM_SIZE:-256m}'
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1G,nosuid,nodev
      - /home/ubuntu:size=2G,nosuid,nodev,uid=1000,gid=1000
      - /var:size=500M,nosuid,nodev
      - /workspace:size=2G,nosuid,nodev,uid=1000,gid=1000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: ${SANDBOX_MEM_LIMIT:-2G}
          cpus: '${SANDBOX_CPU_LIMIT:-1}'
        reservations:
          memory: ${SANDBOX_MEM_RESERVATION:-512M}
    environment:
      - SANDBOX_STREAMING_MODE=${SANDBOX_STREAMING_MODE:-cdp_only}
      - ENABLE_VNC=${ENABLE_VNC:-0}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET}
      - SUPERVISOR_RPC_USERNAME=${SUPERVISOR_RPC_USERNAME}
      - SUPERVISOR_RPC_PASSWORD=${SUPERVISOR_RPC_PASSWORD}
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/usr/local/bin/chromium
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=1 --disable-gpu --disable-vulkan --disable-features=IsolateOrigins,site-per-process --disable-background-networking --disable-sync --disable-translate --disable-default-apps --no-first-run --disable-extensions --js-flags=--max-old-space-size=384
      - LIBGL_ALWAYS_SOFTWARE=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-UTC}
      - SHELL_USE_STRUCTURED_MARKERS=${SHELL_USE_STRUCTURED_MARKERS:-true}
      - RUNTIME_API_HOST=${RUNTIME_API_HOST:-http://backend:8000}
      - RUNTIME_API_TOKEN=${SANDBOX_CALLBACK_TOKEN:-}
      - OPENAI_API_BASE=${SANDBOX_LLM_PROXY_URL:-http://backend:8000/api/v1/llm-proxy/v1}
      - OPENAI_BASE_URL=${SANDBOX_LLM_PROXY_URL:-http://backend:8000/api/v1/llm-proxy/v1}
      - OPENAI_API_KEY=${SANDBOX_LLM_PROXY_KEY:-}
      - CODE_SERVER_PORT=${CODE_SERVER_PORT:-8443}
      - CODE_SERVER_PASSWORD=${CODE_SERVER_PASSWORD:-disabled}
      - ENABLE_CODE_SERVER=${ENABLE_CODE_SERVER:-0}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=sandbox-runtime
      - SENTRY_DSN=${SANDBOX_SENTRY_DSN:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - GOOGLE_DRIVE_TOKEN=${GOOGLE_DRIVE_TOKEN:-}
      - GOOGLE_WORKSPACE_CLI_TOKEN=${GOOGLE_WORKSPACE_CLI_TOKEN:-}
    networks:
      - dokploy-network
      - pythinker-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ---------------------------------------------------------------------------
  # MongoDB Keyfile Init — Generate auth keyfile for replica set (one-shot)
  # ---------------------------------------------------------------------------
  mongodb-keyfile-init:
    image: mongo:7.0.28
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [ ! -f /mongo-keyfile/keyfile ]; then
          openssl rand -base64 756 > /mongo-keyfile/keyfile
          echo "MongoDB keyfile created"
        else
          echo "MongoDB keyfile already exists"
        fi
        chmod 400 /mongo-keyfile/keyfile
        chown 999:999 /mongo-keyfile/keyfile
    volumes:
      - mongodb_keyfile:/mongo-keyfile
    networks:
      - pythinker-internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # MongoDB — Single-Node Replica Set (for oplog/change streams)
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0.28
    hostname: pythinker-mongodb
    restart: always
    depends_on:
      mongodb-keyfile-init:
        condition: service_completed_successfully
    command:
      - mongod
      - --replSet=rs0
      - --keyFile=/mongo-keyfile/keyfile
      - --wiredTigerCacheSizeGB=${MONGO_CACHE_SIZE_GB:-1}
      - --setParameter=diagnosticDataCollectionEnabled=false
      - --setParameter=cursorTimeoutMillis=600000
      - --setParameter=maxIndexBuildMemoryUsageMegabytes=200
    volumes:
      - mongodb_data:/data/db
      - mongodb_keyfile:/mongo-keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    networks:
      - pythinker-internal
    deploy:
      resources:
        limits:
          memory: ${MONGO_MEMORY_LIMIT:-2G}
          cpus: '2'
        reservations:
          memory: 1G
    healthcheck:
      test: >-
        mongosh --norc --quiet
        -u "$$MONGO_INITDB_ROOT_USERNAME"
        -p "$$MONGO_INITDB_ROOT_PASSWORD"
        --authenticationDatabase admin
        --eval "
          try { if (rs.status().ok) quit(0); }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'pythinker-mongodb:27017'}]}); }
          quit(0);
        " || exit 1
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 45s

  # ---------------------------------------------------------------------------
  # Redis — Password-Protected with AOF Persistence
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8.4-alpine
    hostname: pythinker-redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-1gb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --lazyfree-lazy-expire
      - "yes"
      - --lazyfree-lazy-server-del
      - "yes"
      - --latency-monitor-threshold
      - "100"
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - "64mb"
      - --tcp-backlog
      - "511"
      - --hz
      - "10"
      - --io-threads
      - "${REDIS_IO_THREADS:-2}"
    volumes:
      - redis_data:/data
    networks:
      - pythinker-internal
    sysctls:
      - net.core.somaxconn=511
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-512M}
          cpus: '1'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Search with gRPC
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.16.3
    hostname: pythinker-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__STORAGE__QUANTIZATION__SCALAR__TYPE=int8
      - QDRANT__STORAGE__QUANTIZATION__SCALAR__ALWAYS_RAM=true
      - QDRANT__STORAGE__OPTIMIZERS__FLUSH_INTERVAL_SEC=5
    networks:
      - pythinker-internal
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEMORY_LIMIT:-768M}
          cpus: '1'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # MinIO — S3-Compatible Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    hostname: pythinker-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_HEAL_INTERVAL=12h
      - MINIO_API_REQUESTS_MAX=${MINIO_API_REQUESTS_MAX:-100}
      - MINIO_API_REQUESTS_DEADLINE=${MINIO_API_REQUESTS_DEADLINE:-10s}
    volumes:
      - minio_data:/data
    networks:
      - pythinker-internal
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-512M}
          cpus: '1'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO Init — Create Buckets and Service User (one-shot)
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVICE_USER=${MINIO_SERVICE_USER:-pythinker-svc}
      - MINIO_SERVICE_PASSWORD=${MINIO_SERVICE_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-pythinker}
      - MINIO_BUCKET_SNAPSHOTS=${MINIO_BUCKET_SNAPSHOTS:-sandbox-snapshots}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 3 && \
        mc alias set myminio http://pythinker-minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" && \
        mc mb myminio/"$${MINIO_BUCKET_NAME}" --ignore-existing && \
        mc mb myminio/"$${MINIO_BUCKET_SNAPSHOTS}" --ignore-existing && \
        echo "Buckets ready: $${MINIO_BUCKET_NAME}, $${MINIO_BUCKET_SNAPSHOTS}" && \
        mc admin user add myminio "$${MINIO_SERVICE_USER}" "$${MINIO_SERVICE_PASSWORD}" 2>&1 || echo "User may already exist (OK)" && \
        mc admin policy attach myminio readwrite --user "$${MINIO_SERVICE_USER}" 2>&1 || echo "Policy may already be attached (OK)" && \
        mc admin user info myminio "$${MINIO_SERVICE_USER}" && \
        echo "MinIO service user '$$MINIO_SERVICE_USER' ready with readwrite policy"
    networks:
      - pythinker-internal
    restart: "no"

# =============================================================================
# Volumes — Named volumes auto-create on first run, no manual setup needed
# =============================================================================
volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  mongodb_keyfile:
    name: pythinker-mongodb-keyfile
  redis_data:
    name: pythinker-redis-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data
  knowledge_base_data:
    name: pythinker-knowledge-base-data
  dspy_cache:
    name: pythinker-dspy-cache

# =============================================================================
# Networks
# =============================================================================
networks:
  # Traefik network — create with: docker network create dokploy-network
  dokploy-network:
    external: true
  # Internal network — databases and services only, no internet access.
  pythinker-internal:
    internal: true
