# Quick-start Docker Compose for Pythinker
# Copy this file and customize environment variables for your deployment.
# For development, use docker-compose-development.yml instead.

services:
  frontend:
    image: pythinker/pythinker-frontend
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pythinker-network
    environment:
      - BACKEND_URL=http://backend:8000

  backend:
    image: pythinker/pythinker-backend
    depends_on:
      sandbox:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      redis-cache:
        condition: service_started
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
    networks:
      - pythinker-network
    environment:
      # OpenAI-compatible API configuration
      - API_BASE=https://api.openai.com/v1
      - API_KEY=sk-xxxx  # Replace with your API key
      - MODEL_NAME=gpt-4o
      - TEMPERATURE=0.7
      - MAX_TOKENS=2000

      # Sandbox configuration
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_API_SECRET=change-me-to-a-real-secret
      - SANDBOX_STREAMING_MODE=cdp_only

      # Search engine (options: duckduckgo, bing, google, brave, tavily, serper)
      - SEARCH_PROVIDER=duckduckgo

      # Auth configuration (options: password, none, local)
      - AUTH_PROVIDER=password
      - PASSWORD_SALT=  # Generate: python -c "import secrets; print(secrets.token_urlsafe(16))"

      # JWT configuration
      - JWT_SECRET_KEY=your-secret-key-here  # Generate: python -c "import secrets; print(secrets.token_urlsafe(32))"
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7

      # MinIO object storage
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin

      # Suppress noisy warnings
      - GRPC_ENABLE_FORK_SUPPORT=0
      - NODE_OPTIONS=--no-deprecation

      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sandbox:
    image: pythinker/pythinker-sandbox
    hostname: sandbox
    init: true
    restart: unless-stopped
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/opt/chrome-for-testing/chrome
      - SANDBOX_API_SECRET=change-me-to-a-real-secret
      - SANDBOX_STREAMING_MODE=cdp_only
    shm_size: '2g'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
          pids: 300
        reservations:
          memory: 512M
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin       # Change in production
      - MINIO_ROOT_PASSWORD=minioadmin   # Change in production
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - volatile-lfu
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    volumes:
      - redis_runtime_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-cache:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lfu
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  redis_runtime_data:
    name: pythinker-redis-runtime-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
