version: '3.8'

# Dokploy-optimized Docker Compose for Pythinker
# Deployment: Use this file in Dokploy's Docker Compose deployment
# Documentation: https://docs.dokploy.com/docs/core/docker-compose

services:
  frontend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-frontend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pythinker-network
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf.template:ro

  backend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-backend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      sandbox:
        condition: service_started
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # IMPORTANT: Dokploy requires Docker socket for sandbox management
      # Ensure Dokploy host has Docker socket accessible
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pythinker-network
    # Environment variables managed via Dokploy UI (do not use env_file)
    environment:
      # LLM Configuration (set in Dokploy)
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - API_KEY=${API_KEY}
      - API_BASE=${API_BASE}
      - MODEL_NAME=${MODEL_NAME}
      - TEMPERATURE=${TEMPERATURE:-0.6}
      - MAX_TOKENS=${MAX_TOKENS:-16384}
      # Embedding Configuration
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      # Database Connections
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=pythinker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_GRPC_PORT=6334
      - QDRANT_PREFER_GRPC=true
      - QDRANT_COLLECTION=agent_memories
      # MinIO S3 Storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=pythinker
      - MINIO_USE_SSL=false
      - FILE_STORAGE_BACKEND=minio
      # Sandbox Configuration
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - SANDBOX_NAME_PREFIX=sandbox
      - SANDBOX_TTL_MINUTES=30
      - SANDBOX_NETWORK=pythinker-network
      - SANDBOX_SHM_SIZE=1536m
      - SANDBOX_MEM_LIMIT=2g
      - SANDBOX_CPU_LIMIT=1
      - SANDBOX_PIDS_LIMIT=300
      # Sandbox Pool (2 concurrent tasks)
      - SANDBOX_POOL_ENABLED=true
      - SANDBOX_POOL_MIN_SIZE=1
      - SANDBOX_POOL_MAX_SIZE=2
      - SANDBOX_POOL_WARMUP_INTERVAL=30
      - SANDBOX_POOL_IDLE_TTL_SECONDS=300
      - SANDBOX_POOL_PAUSE_IDLE=true
      - SANDBOX_POOL_HOST_MEMORY_THRESHOLD=0.80
      # Search Configuration
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-serper}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SERPER_API_KEY_2=${SERPER_API_KEY_2}
      - SERPER_API_KEY_3=${SERPER_API_KEY_3}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      # Auth
      - AUTH_PROVIDER=${AUTH_PROVIDER:-none}
      - LOCAL_AUTH_EMAIL=${LOCAL_AUTH_EMAIL:-admin@pythinker.com}
      - LOCAL_AUTH_PASSWORD=${LOCAL_AUTH_PASSWORD:-admin*123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      # Feature Flags
      - FEATURE_FAILURE_PREDICTION=true
      - FEATURE_TASKGROUP_ENABLED=true
      - FEATURE_SSE_V2=true
      - FEATURE_STRUCTURED_OUTPUTS=true
      - FEATURE_PARALLEL_MEMORY=true
      - ENABLE_TIMELINE_RECORDING=true
      - BROWSER_AGENT_ENABLED=true
      - BROWSER_AGENT_MAX_STEPS=25
      - BROWSER_AGENT_TIMEOUT=300
      - BROWSER_AGENT_USE_VISION=true
      # Monitoring (optional - disable if not needed)
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      # Suppress warnings
      - GRPC_ENABLE_FORK_SUPPORT=0
      - NODE_OPTIONS=--no-deprecation
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sandbox:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
      platforms:
        - linux/amd64
    hostname: sandbox
    init: true  # Prevent zombie Chrome processes (Playwright best practice)
    restart: unless-stopped
    volumes:
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml:ro
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/usr/local/bin/chromium  # Playwright Chromium symlink (USE_CHROMIUM=1)
    ports:
      - "8083:8080"
      - "8082:8082"
      - "5902:5900"
      - "5901:5901"
    shm_size: '2g'  # Playwright recommended minimum
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev  # 1GB for Chrome --disable-dev-shm-usage shared memory
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
          pids: 300
        reservations:
          memory: 512M
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  sandbox2:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
      platforms:
        - linux/amd64
    hostname: sandbox2
    init: true  # Prevent zombie Chrome processes (Playwright best practice)
    restart: unless-stopped
    volumes:
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml:ro
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/usr/local/bin/chromium  # Playwright Chromium symlink (USE_CHROMIUM=1)
    ports:
      - "8084:8080"
      - "8085:8082"
    shm_size: '2g'  # Playwright recommended minimum
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev  # 1GB for Chrome --disable-dev-shm-usage shared memory
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
          pids: 300
        reservations:
          memory: 512M
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    networks:
      - pythinker-network

  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # MONITORING STACK (Grafana + Prometheus + Loki + Promtail)
  # ============================================================================

  prometheus:
    image: prom/prometheus:v3.9.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:latest
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - pythinker-network

# Dokploy-managed volumes (supports automatic backups)
volumes:
  mongodb_data:
    driver: local
  qdrant_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  pythinker-network:
    driver: bridge
