# =============================================================================
# Promtail Configuration — Pythinker AI Agent Log Collection
# =============================================================================
# Best-practice pipeline for 2026 LLM observability:
#   1. Docker JSON log unwrap
#   2. Structured JSON field extraction (backend/gateway emit JSON via structlog)
#   3. Multi-format level detection (JSON, structlog plain, loguru, Chromium, MongoDB)
#   4. Error pattern detection (Traceback, Exception, OOM)
#   5. Multiline traceback grouping
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      # ─── Stage 1: Unwrap Docker JSON log format ───────────────────────
      - docker: {}

      # ─── Stage 2: Try JSON parsing (backend/gateway emit JSON logs) ───
      # Extracts: level, event, logger, request_id, and any extra fields
      # If log line is not JSON, this silently fails and falls through
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            request_id: request_id
            # Agent-specific fields for diagnostics
            duration_ms: duration_ms
            tool_name: tool_name
            method: method
            path: path
            status_code: status

      # ─── Stage 3: Level extraction — multi-format cascade ─────────────
      # JSON logs already have level extracted above.
      # These regex stages handle non-JSON formats (sandbox, MongoDB, etc.)
      # Promtail only captures if field is empty, so JSON level takes priority.

      # structlog plain format: level word followed by 2+ spaces
      - regex:
          expression: '(?P<level>critical|error|warning|info|debug)\s{2,}'

      # Python logging / loguru: "| INFO |", "- ERROR -"
      - regex:
          expression: '[\|\-]\s+(?P<level>CRITICAL|ERROR|WARNING|INFO|DEBUG)\s+[\|\-]'

      # Chromium/sandbox: ":ERROR:", ":WARNING:", ":FATAL:"
      - regex:
          expression: ':(?P<level>FATAL|ERROR|WARNING|INFO):'

      # uvicorn startup: "INFO:     Uvicorn running"
      - regex:
          expression: '^(?P<level>INFO|WARNING|ERROR|DEBUG):\s'

      # MongoDB JSON: "s":"I", "s":"W", "s":"E", "s":"F"
      - regex:
          expression: '"s":"(?P<level>I|W|E|F)"'

      # Go structured logs (monitoring stack): level=info, level=warn
      - regex:
          expression: 'level=(?P<level>info|warn|error|debug|critical)'

      # ─── Stage 4: Normalize level ────────────────────────────────────
      - template:
          source: level
          template: >-
            {{ $v := ToLower .Value }}
            {{- if eq $v "i" }}info
            {{- else if eq $v "w" }}warning
            {{- else if eq $v "e" }}error
            {{- else if eq $v "f" }}fatal
            {{- else if eq $v "warn" }}warning
            {{- else if $v }}{{ $v }}
            {{- else }}unknown
            {{- end }}

      # ─── Stage 5: Set labels for Loki indexing ───────────────────────
      # Only low-cardinality fields go here. High-cardinality fields
      # (event, logger, request_id, tool_name, etc.) stay in the log line
      # and are queried with |= or | json filters.
      - labels:
          level:

      # ─── Stage 6: Structured metadata (Loki 3.x) ──────────────────
      # High-cardinality fields stored as metadata — queryable via
      # | event="request_completed" but NOT indexed as labels.
      - structured_metadata:
          event:
          logger:
          request_id:
          tool_name:
          method:
          path:
          status_code:

      # ─── Stage 7: Error pattern detection ────────────────────────────
      - regex:
          expression: '(?P<error_type>Traceback|Exception|Error|FATAL|OOMKilled|panic)'
      - labels:
          error_type:

      # ─── Stage 7: Multiline — group Python tracebacks ───────────────
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}[T ]|^\{"|^\[?\d+:\d+:'
          max_wait_time: 3s
          max_lines: 128
