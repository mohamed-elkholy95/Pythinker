user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80;
        server_name  localhost;

        # Never cache app shell so clients pick up the latest bundle map.
        location = /index.html {
            root   /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static bundles are content-hashed by Vite, so immutable caching is safe.
        location /assets/ {
            root   /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # BACKEND_URL is substituted by docker-entrypoint.sh at container startup.
            # Keep proxy_pass static to avoid per-request DNS resolver edge cases.
            proxy_pass ${BACKEND_URL};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Connection timeouts for resilience during backend restarts
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SSE (Server-Sent Events) support - disable buffering
            proxy_buffering off;
            proxy_cache off;

            # Error handling - return 502 on connect failures
            proxy_intercept_errors on;
            error_page 502 503 504 = @backend_unavailable;
        }

        # Custom error response when backend is unavailable
        location @backend_unavailable {
            default_type application/json;
            return 503 '{"code": 503, "msg": "Backend service temporarily unavailable. Please retry.", "data": null}';
        }
    }
} 
