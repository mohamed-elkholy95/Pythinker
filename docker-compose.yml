services:
  frontend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pythinker-network
    environment:
      - BACKEND_URL=http://backend:8000

  backend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    depends_on:
      - sandbox
      - mongodb
      - redis
      - qdrant
      - whoogle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
    networks:
      - pythinker-network
    env_file:
      - .env

  sandbox:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    hostname: sandbox
    restart: unless-stopped
    volumes:
      # Openbox config for proper window management - ensures Chrome stays centered at 0,0
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml:ro
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
    ports:
      - "8083:8080"  # Sandbox API
      - "8082:8082"  # Sandbox framework API
      - "5902:5900"  # VNC
      - "5901:5901"  # VNC WebSocket
    # Shared memory size for Chrome browser stability (prevents crashes)
    shm_size: '2gb'
    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    # Temp filesystem - sandbox needs exec capability for code execution
    tmpfs:
      - /run:size=100M,nosuid,nodev
      - /tmp:size=500M,nosuid,nodev
      - /home/ubuntu/.cache:size=200M,nosuid,nodev
    # File descriptor limits for browser and node processes
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    # Resource limits for browser sandbox
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
          pids: 500
        reservations:
          memory: 1G
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    #ports:
    #  - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - pythinker-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - pythinker-network

  whoogle:
    image: benbusby/whoogle-search:latest
    restart: unless-stopped
    networks:
      - pythinker-network

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  qdrant_data:
    name: pythinker-qdrant-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
