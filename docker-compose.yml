services:
  frontend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-frontend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf.template:ro

  backend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-backend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
    depends_on:
      sandbox:
        condition: service_started
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=${SANDBOX_LIFECYCLE_MODE:-static}
      - SANDBOX_ADDRESS=${SANDBOX_ADDRESS:-sandbox}
      - GRPC_ENABLE_FORK_SUPPORT=0  # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation  # Suppress Playwright url.parse() deprecation
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sandbox:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
      x-bake:
        platforms:
          - linux/amd64
    hostname: sandbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    volumes:
      # Openbox config for proper window management - ensures Chrome stays centered at 0,0
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml:ro
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/usr/bin/chromium-browser
    ports:
      - "8083:8080"  # Sandbox API
      - "8082:8082"  # Sandbox framework API
      - "5902:5900"  # VNC
      - "5901:5901"  # VNC WebSocket
    # Shared memory: 1.5GB for apt Chromium (lighter than Chrome for Testing)
    shm_size: '1536m'
    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    # Temp filesystem - sandbox needs exec capability for code execution
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=300M,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    # File descriptor limits for browser and node processes
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    # Resource limits: 2G per sandbox (Chromium uses less than Chrome for Testing)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
          pids: 300
        reservations:
          memory: 512M
    networks:
      - pythinker-network

  sandbox2:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
      x-bake:
        platforms:
          - linux/amd64
    hostname: sandbox2
    restart: unless-stopped
    volumes:
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml:ro
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/usr/bin/chromium-browser
    ports:
      - "8084:8080"  # Sandbox API
      - "8085:8082"  # Sandbox framework API
      - "5904:5900"  # VNC native port
      - "5903:5901"  # VNC WebSocket port
    shm_size: '1536m'
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=300M,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
          pids: 300
        reservations:
          memory: 512M
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  minio:
    image: minio/minio:latest
    container_name: pythinker-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    #ports:
    #  - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    networks:
      - pythinker-network

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
