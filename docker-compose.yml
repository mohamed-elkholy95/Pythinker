services:
  frontend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-frontend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pythinker-network
      - traefik-public
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf.template:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.pythinker.rule=Host(`pythinker.pythought.com`)"
      - "traefik.http.routers.pythinker.entrypoints=web"
      - "traefik.http.services.pythinker.loadbalancer.server.port=80"

  backend:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-backend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
      x-bake:
        platforms:
          - linux/amd64
    depends_on:
      sandbox:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - knowledge_base_data:/app/data/knowledge_bases
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
    networks:
      - pythinker-network
      - traefik-public
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=${SANDBOX_LIFECYCLE_MODE:-static}
      - SANDBOX_ADDRESS=${SANDBOX_ADDRESS:-sandbox}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:?Set SANDBOX_API_SECRET in .env}
      - GRPC_ENABLE_FORK_SUPPORT=0 # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation # Suppress Playwright url.parse() deprecation
      - FAST_MODEL=${FAST_MODEL:-qwen/qwen3-coder-next}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.pythinker-api.rule=Host(`pythinker.pythought.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.pythinker-api.entrypoints=web"
      - "traefik.http.services.pythinker-api.loadbalancer.server.port=8000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sandbox:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
        ENABLE_SANDBOX_ADDONS: "${ENABLE_SANDBOX_ADDONS:-0}" # Keep minimal profile by default
      x-bake:
        platforms:
          - linux/amd64
    hostname: sandbox
    # init: true removed — sandbox/Dockerfile already uses tini ENTRYPOINT (zombie Chrome reaping handled there)
    restart: unless-stopped
    # NOTE: privileged:true removed — it silently disables seccomp, cap_drop, and
    # no-new-privileges. For the openat2/fsmount Ubuntu kernel issue, use
    # seccomp=unconfined as a narrower workaround until the seccomp allowlist is updated.
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=1 --disable-gpu --js-flags=--max-old-space-size=512
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/opt/chrome-for-testing/chrome # Resolved by Dockerfile symlink (works for both Chrome and Chromium)
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:?Set SANDBOX_API_SECRET in .env}
      - LIBGL_ALWAYS_SOFTWARE=1 # Suppress Vulkan/GPU driver warnings in headless containers
    # Sandbox ports bound to localhost only — backend proxies API/live-preview to users.
    # Never expose sandbox ports on 0.0.0.0 (unauthenticated shell/file access).
    ports:
      - "127.0.0.1:8083:8080" # Sandbox API (localhost only)
      - "127.0.0.1:8082:8082" # Sandbox framework API (localhost only)
    shm_size: '2g'
    # Security hardening (seccomp=unconfined workaround for openat2/fsmount kernel issue)
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    # Temp filesystem - sandbox needs exec capability for code execution
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev # 1GB for Chrome temp files and user data
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    # File descriptor limits for browser processes
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      # nproc removed: redundant with cgroup pids limit and scoped per-UID
      # (moby/moby#31424) — causes confusing pthread_create EAGAIN failures
      # Resource limits: 2G per sandbox (Chromium uses less than Chrome for Testing)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 512M
    networks:
      - pythinker-network

  sandbox2:
    image: ${IMAGE_REGISTRY:-pythinker}/pythinker-sandbox:${IMAGE_TAG:-latest}
    platform: linux/amd64
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        USE_CHROMIUM: "1"
        ENABLE_SANDBOX_ADDONS: "${ENABLE_SANDBOX_ADDONS:-0}" # Keep minimal profile by default
      x-bake:
        platforms:
          - linux/amd64
    hostname: sandbox2
    # init: true removed — sandbox/Dockerfile already uses tini ENTRYPOINT (zombie Chrome reaping handled there)
    restart: unless-stopped
    environment:
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=1 --disable-gpu --js-flags=--max-old-space-size=512
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - BROWSER_PATH=/opt/chrome-for-testing/chrome # Resolved by Dockerfile symlink (works for both Chrome and Chromium)
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:?Set SANDBOX_API_SECRET in .env}
      - LIBGL_ALWAYS_SOFTWARE=1 # Suppress Vulkan/GPU driver warnings in headless containers
    ports:
      - "127.0.0.1:8084:8080" # Sandbox API (localhost only)
      - "127.0.0.1:8085:8082" # Sandbox framework API (localhost only)
    shm_size: '2g'
    # Security hardening (seccomp=unconfined workaround for openat2/fsmount kernel issue)
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev # 1GB for Chrome temp files and user data
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 512M
    networks:
      - pythinker-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: pythinker-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    #ports:
    #  - "27017:27017"
    networks:
      - pythinker-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
      # Auto-compact AOF when it doubles and exceeds 64 MB — prevents unbounded
      # growth and the startup-crash loop caused by a corrupted tail.
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - "64mb"
      # Allow truncating up to 8 KB of corrupt AOF tail instead of hard-crashing.
      - --aof-load-corrupt-tail-max-size
      - "8192"
    volumes:
      - redis_runtime_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: [ "CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  redis_runtime_data:
    name: pythinker-redis-runtime-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data
  knowledge_base_data:
    name: pythinker-knowledge-base-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
  traefik-public:
    name: traefik-public
    external: true
