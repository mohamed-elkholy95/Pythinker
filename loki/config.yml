auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
    # Single-node: skip the 15s ring stabilization wait so queries work immediately
    join_after: 0s
    min_ready_duration: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  wal:
    dir: /loki/wal

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true
  volume_enabled: true
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB
  retention_period: 720h  # 30 days — matches Prometheus retention

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 50
  delete_request_store: filesystem

query_range:
  align_queries_with_step: true

distributor:
  ring:
    kvstore:
      store: inmemory

ruler:
  # No Alertmanager in dev stack — disable alert forwarding to avoid
  # recurring "Error sending alerts" noise in logs
  enable_alertmanager_v2: false
  alertmanager_url: ""
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules_tmp
  enable_api: true
  ring:
    kvstore:
      store: inmemory
