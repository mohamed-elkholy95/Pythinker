services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src  # Mount only source code
      - ./frontend/public:/app/public  # Mount public assets
      - ./frontend/index.html:/app/index.html  # Mount index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts  # Mount vite config
      - ./frontend/tsconfig.json:/app/tsconfig.json  # Mount tsconfig
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json  # Mount tsconfig app
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json  # Mount tsconfig node
      - ./frontend/env.d.ts:/app/env.d.ts  # Mount env types
    ports:
      - "5173:5173"  # Vite default development port
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pythinker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./dev.sh"]  # Start in reload mode
    volumes:
      - ./backend:/app  # Mount source code directory
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "8000:8000"
    depends_on:
      sandbox:
        condition: service_started
        required: false
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      qdrant:
        condition: service_healthy
        required: true
      searxng:
        condition: service_started
        required: false
      whoogle:
        condition: service_started
        required: false
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_ADDRESS=sandbox # Use single container as sandbox

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      #- "9222:9222"
      - "5902:5900"
      - "5901:5901"
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    # Shared memory size for Chrome browser stability (prevents crashes)
    shm_size: '2gb'
    # Resource limits for browser sandbox
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    environment:
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mockserver:
    build:
      context: ./mockserver
      dockerfile: Dockerfile
    volumes:
      - ./mockserver:/app  # Mount source code directory
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    restart: unless-stopped
    environment:
      - MOCK_DATA_FILE=default.yaml
      - MOCK_DELAY=1
    networks:
      - pythinker-network

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - pythinker-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - pythinker-network

  whoogle:
    image: benbusby/whoogle-search:latest
    ports:
      - "5001:5000"  # Changed from 5000 to avoid macOS AirPlay conflict
    restart: unless-stopped
    networks:
      - pythinker-network

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  qdrant_data:
    name: pythinker-qdrant-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
