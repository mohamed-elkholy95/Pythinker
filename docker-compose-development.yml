# =============================================================================
# Development Compose — Docker Compose Watch
#
# Usage:
#   docker compose -f docker-compose-development.yml up --watch
#   ./dev.sh watch          # Equivalent (recommended)
#   ./dev.sh up -d          # Start without watch (manual sync via ./dev.sh sync)
#
# Compose Watch syncs file changes from host → container via Docker API (tar+cp),
# bypassing the OrbStack TCC/FDA restriction on bind mounts from ~/Desktop.
# Files land on the container's native ext4 filesystem, so inotify events fire
# immediately — no polling required.
#
# Actions:
#   sync      — Copy changed files into running container (HMR / hot reload)
#   rebuild   — Rebuild image + replace container (dependency changes)
#   sync+restart — Copy files + restart container process (config changes)
# =============================================================================

services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # No bind mounts for source code — compose watch handles sync.
    # The Dockerfile.dev COPYs source into the image for initial state.
    ports:
      - "5174:5174"  # Vite dev server
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - BACKEND_URL=http://backend:8000
      - VITE_HOST=true         # Bind Vite on 0.0.0.0 so HMR WebSocket reaches the browser
      # No VITE_USE_POLLING — native inotify works with compose watch (no polling overhead)
    depends_on:
      backend:
        condition: service_started
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    develop:
      watch:
        # Source code → Vite HMR (instant browser update, no page reload)
        - action: sync
          path: ./frontend/src
          target: /app/src
        # Static assets
        - action: sync
          path: ./frontend/public
          target: /app/public
        # HTML entry point
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        # Vite/TS config changes → sync (Vite auto-restarts on config change)
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json
        - action: sync
          path: ./frontend/tsconfig.node.json
          target: /app/tsconfig.node.json
        - action: sync
          path: ./frontend/env.d.ts
          target: /app/env.d.ts
        # Dependency changes → full image rebuild (npm ci)
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "app", "--reload-exclude", "tests/*", "--reload-exclude", "docs/*", "--reload-exclude", "*.md", "--timeout-graceful-shutdown", "3"]
    volumes:
      # Only non-source mounts — compose watch handles app/ code sync
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      qdrant:
        condition: service_started
        required: true
      minio:
        condition: service_started
        required: true
      sandbox:
        condition: service_started
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - SANDBOX_CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - "LOCAL_AUTH_PASSWORD=AdminPy@2026!"
      - GRPC_ENABLE_FORK_SUPPORT=0  # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation  # Suppress Playwright url.parse() deprecation
    healthcheck:
      # OrbStack: exec-based health checks hang; backend responds fine on port 8000
      test: ["NONE"]
    develop:
      watch:
        # Application source → uvicorn --reload detects via inotify
        - action: sync
          path: ./backend/app
          target: /app/app
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
        # Dependency changes → full image rebuild (pip install)
        - action: rebuild
          path: ./backend/requirements.txt

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    # Security hardening (seccomp=unconfined workaround for openat2/fsmount kernel issue on OrbStack)
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - SYS_ADMIN
    volumes:
      # No source bind mounts — compose watch handles sync
      - /app/__pycache__  # Avoid cache conflicts
      - /app/.venv  # Avoid venv conflicts
    ports:
      - "127.0.0.1:8083:8080"   # Sandbox API (localhost only)
      - "127.0.0.1:8082:8082"   # Framework API (localhost only)
    shm_size: '4gb'
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2'
          pids: 1024
        reservations:
          memory: 1G
    environment:
      - SANDBOX_STREAMING_MODE=${SANDBOX_STREAMING_MODE:-cdp_only}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=2 --disable-gpu --disable-features=CalculateNativeWinOcclusion --disable-gpu-memory-buffer-compositor-resources --disable-gpu-memory-buffer-video-frames --js-flags=--max-old-space-size=512
      - BROWSER_PATH=/opt/chrome-for-testing/chrome
      - LIBGL_ALWAYS_SOFTWARE=1
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]
    develop:
      watch:
        # Sandbox application code
        - action: sync
          path: ./sandbox/app
          target: /app/app
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
        # Sandbox scripts
        - action: sync
          path: ./sandbox/scripts
          target: /app/scripts
        # Supervisor config → sync + restart supervisor
        - action: sync+restart
          path: ./sandbox/supervisord.conf
          target: /etc/supervisor/conf.d/app.conf
        # Dependency changes → full rebuild
        - action: rebuild
          path: ./sandbox/requirements.txt
        - action: rebuild
          path: ./sandbox/requirements.runtime.txt

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    volumes:
      - redis_runtime_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      # OrbStack: exec-based health checks hang; service responds fine on port 6379
      test: ["NONE"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_IDENTITY_OPENID_ENABLE=off
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  redis_runtime_data:
    name: pythinker-redis-runtime-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
