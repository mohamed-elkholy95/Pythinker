services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src  # Mount only source code
      - ./frontend/public:/app/public  # Mount public assets
      - ./frontend/index.html:/app/index.html  # Mount index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts  # Mount vite config
      - ./frontend/tsconfig.json:/app/tsconfig.json  # Mount tsconfig
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json  # Mount tsconfig app
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json  # Mount tsconfig node
      - ./frontend/env.d.ts:/app/env.d.ts  # Mount env types
    ports:
      - "5173:5173"  # Vite default development port
    environment:
      - NODE_ENV=development
      #- VITE_API_URL=http://127.0.0.1:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pythinker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./dev.sh"]  # Start in reload mode
    volumes:
      - ./backend:/app  # Mount source code directory
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "8000:8000"
    depends_on:
      sandbox:
        condition: service_started
        required: false
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      searxng:
        condition: service_started
        required: false
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_ADDRESS=sandbox # Use single container as sandbox

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      #- "9222:9222"
      - "5902:5900"
      #- "5901:5901"
      - "8080:8080"
    environment:
      - UVI_ARGS="--reload"
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    restart: unless-stopped
    networks:
      - pythinker-network

  mockserver:
    build:
      context: ./mockserver
      dockerfile: Dockerfile
    volumes:
      - ./mockserver:/app  # Mount source code directory
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    restart: unless-stopped
    environment:
      - MOCK_DATA_FILE=default.yaml
      - MOCK_DELAY=1
    networks:
      - pythinker-network

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:7.0
    restart: unless-stopped
    networks:
      - pythinker-network

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - pythinker-network

volumes:
  mongodb_data:
    name: pythinker-mongodb-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
