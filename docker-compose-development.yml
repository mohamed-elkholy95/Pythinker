services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src  # Mount only source code
      - ./frontend/public:/app/public  # Mount public assets
      - ./frontend/index.html:/app/index.html  # Mount index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts  # Mount vite config
      - ./frontend/tsconfig.json:/app/tsconfig.json  # Mount tsconfig
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json  # Mount tsconfig app
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json  # Mount tsconfig node
      - ./frontend/env.d.ts:/app/env.d.ts  # Mount env types
    ports:
      - "5174:5174"  # Vite default development port
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - BACKEND_URL=http://backend:8000
      - VITE_USE_POLLING=true
      - VITE_POLLING_INTERVAL=100

    depends_on:
      backend:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./dev.sh"]  # Start in reload mode
    volumes:
      - ./backend:/app  # Mount source code directory
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      redis-cache:
        condition: service_started
        required: true
      qdrant:
        condition: service_healthy
        required: true
      minio:
        condition: service_healthy
        required: true
      sandbox:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - SANDBOX_CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - "LOCAL_AUTH_PASSWORD=admin*123"  # Override .env to handle special chars
      - GRPC_ENABLE_FORK_SUPPORT=0  # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation  # Suppress Playwright url.parse() deprecation
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.workers.job_worker
    volumes:
      - ./backend:/app  # Mount source code for hot reload
      - /app/__pycache__  # Avoid overwriting cache
      - /app/.venv  # Avoid overwriting venv
    depends_on:
      backend:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      redis-cache:
        condition: service_started
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - WORKER_ID=worker-dev-1
      - MAX_CONCURRENT_JOBS=3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_ENABLE_FORK_SUPPORT=0
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, signal; os.kill(1, 0)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64  # Native on Apple Silicon; uses Chromium from apt (avoids QEMU SIGTRAP crashes)
    # Omit platform to use host architecture (arm64 on Apple Silicon = native Chromium, no QEMU)
    hostname: sandbox
    init: true  # Prevent zombie Chrome processes (Playwright best practice)
    # Security hardening: align dev with production baseline (2026-02-13)
    # Chrome --no-sandbox is correct: container provides cap_drop+seccomp+no-new-privileges isolation
    security_opt:
      - no-new-privileges:true
      - seccomp:./sandbox/seccomp-sandbox.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SYS_CHROOT
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml  # Openbox config for window management
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      # Sandbox ports bound to localhost only — accessed via authenticated backend proxy.
      # To debug VNC directly: use a VNC client to connect to 127.0.0.1:5902
      - "127.0.0.1:5902:5900"   # VNC native (localhost only, for debugging)
      - "127.0.0.1:5901:5901"   # VNC WebSocket (localhost only, for debugging)
      - "127.0.0.1:8083:8080"   # Sandbox API (localhost only)
      - "127.0.0.1:8082:8082"   # Framework API (localhost only)
    # Shared memory for Chrome: 4GB for Mojo data pipes (avoids "Failed to create Mojo data pipe" on heavy sites)
    shm_size: '4gb'
    # Temp filesystem - improves I/O performance for browser temp files
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev  # 1GB for Chrome --disable-dev-shm-usage shared memory
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    # File descriptor limits for browser and node processes
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    # Resource limits - 6G memory + 4G shm reduces Mojo data pipe / page crashes on heavy sites
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2'
          pids: 300
        reservations:
          memory: 1G
    environment:
      - SANDBOX_STREAMING_MODE=${SANDBOX_STREAMING_MODE:-dual}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=2 --disable-features=CalculateNativeWinOcclusion --disable-gpu-memory-buffer-compositor-resources --disable-gpu-memory-buffer-video-frames --js-flags=--max-old-space-size=512
      - BROWSER_PATH=/opt/chrome-for-testing/chrome
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    volumes:
      - redis_runtime_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-cache:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_CACHE_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_CACHE_MAXMEMORY_POLICY:-allkeys-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}       # Dev only - override in .env for non-local
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}  # Dev only - override in .env for non-local
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  redis_runtime_data:
    name: pythinker-redis-runtime-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
