# =============================================================================
# Development Compose — Docker Compose Watch
#
# Usage:
#   docker compose -f docker-compose-development.yml up --watch
#   ./dev.sh watch          # Equivalent (recommended)
#   ./dev.sh up -d          # Start without watch (manual sync via ./dev.sh sync)
#
# Compose Watch syncs file changes from host → container via Docker API (tar+cp),
# bypassing the OrbStack TCC/FDA restriction on bind mounts from ~/Desktop.
# Files land on the container's native ext4 filesystem, so inotify events fire
# immediately — no polling required.
#
# Actions:
#   sync      — Copy changed files into running container (HMR / hot reload)
#   rebuild   — Rebuild image + replace container (dependency changes)
#   sync+restart — Copy files + restart container process (config changes)
# =============================================================================

services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # No bind mounts for source code — compose watch handles sync.
    # The Dockerfile.dev COPYs source into the image for initial state.
    ports:
      - "5174:5174"  # Vite dev server
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - BACKEND_URL=http://backend:8000
      - VITE_HOST=true         # Bind Vite on 0.0.0.0 so HMR WebSocket reaches the browser
      # No VITE_USE_POLLING — native inotify works with compose watch (no polling overhead)
    depends_on:
      backend:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    develop:
      watch:
        # Source code → Vite HMR (instant browser update, no page reload)
        - action: sync
          path: ./frontend/src
          target: /app/src
        # Static assets
        - action: sync
          path: ./frontend/public
          target: /app/public
        # HTML entry point
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        # Vite/TS config changes → sync (Vite auto-restarts on config change)
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json
        - action: sync
          path: ./frontend/tsconfig.node.json
          target: /app/tsconfig.node.json
        - action: sync
          path: ./frontend/env.d.ts
          target: /app/env.d.ts
        # Dependency changes → full image rebuild (npm ci)
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./dev.sh"]
    volumes:
      # Fallback bind mount keeps backend source in sync even when `docker compose watch`
      # is not running (common in local dev sessions).
      - ./backend/app:/app/app
      # Non-source mount required by the sandbox tooling.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dspy_cache:/app/data/dspy_cache
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      qdrant:
        condition: service_started
        required: true
      minio:
        condition: service_started
        required: true
      sandbox:
        condition: service_started
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/pythinker?authSource=admin}
      - MONGODB_USERNAME=${MONGODB_USERNAME:-pythinker_admin}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-pythinker_admin_password_change_me}
      - SANDBOX_CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - LOCAL_AUTH_PASSWORD=${LOCAL_AUTH_PASSWORD:-changeme}
      - GRPC_ENABLE_FORK_SUPPORT=0  # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation  # Suppress Playwright url.parse() deprecation
      - BACKEND_ENABLE_RELOAD=${BACKEND_ENABLE_RELOAD:-0}
      - BACKEND_UVICORN_GRACEFUL_TIMEOUT=${BACKEND_UVICORN_GRACEFUL_TIMEOUT:-10}
    healthcheck:
      # On Linux: exec-based health checks work normally.
      # On macOS + OrbStack: exec-based health checks may hang — revert to test: ["NONE"]
      # and change frontend-dev depends_on to condition: service_started.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    develop:
      watch:
        # Application source sync; enable uvicorn auto-reload with BACKEND_ENABLE_RELOAD=1
        - action: sync
          path: ./backend/app
          target: /app/app
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
        # Dependency changes → full image rebuild (pip install)
        - action: rebuild
          path: ./backend/requirements.txt

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.interfaces.gateway.gateway_runner"]
    volumes:
      # Keep gateway runner source in sync with local backend changes.
      - ./backend/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dspy_cache:/app/data/dspy_cache
    depends_on:
      backend:
        condition: service_healthy
        required: true
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      qdrant:
        condition: service_started
        required: true
      minio:
        condition: service_started
        required: true
      sandbox:
        condition: service_started
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - CHANNEL_GATEWAY_ENABLED=true
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/pythinker?authSource=admin}
      - MONGODB_USERNAME=${MONGODB_USERNAME:-pythinker_admin}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-pythinker_admin_password_change_me}
      - SANDBOX_CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --js-flags=--max-old-space-size=512
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - LOCAL_AUTH_PASSWORD=${LOCAL_AUTH_PASSWORD:-changeme}
      - GRPC_ENABLE_FORK_SUPPORT=0
      - NODE_OPTIONS=--no-deprecation
      - FAST_MODEL=${FAST_MODEL:-}
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
        - action: rebuild
          path: ./backend/requirements.txt

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    # Security hardening (seccomp=unconfined workaround for openat2/fsmount kernel issue on OrbStack)
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - SYS_ADMIN
    volumes:
      # No source bind mounts — compose watch handles sync
      - /app/__pycache__  # Avoid cache conflicts
      - /app/.venv  # Avoid venv conflicts
    ports:
      - "127.0.0.1:8083:8080"   # Sandbox API (localhost only)
      - "127.0.0.1:8082:8082"   # Framework API (localhost only)
    shm_size: '4gb'
    tmpfs:
      - /run:size=50M,nosuid,nodev,uid=1000,gid=1000
      - /run/user/1000:size=10M,nosuid,nodev,uid=1000,gid=1000,mode=0700
      - /tmp:size=1g,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '2'
          pids: 1024
        reservations:
          memory: 1G
    environment:
      - SANDBOX_STREAMING_MODE=${SANDBOX_STREAMING_MODE:-cdp_only}
      - SANDBOX_API_SECRET=${SANDBOX_API_SECRET:-dev-sandbox-secret-change-me}
      - SUPERVISOR_RPC_USERNAME=${SUPERVISOR_RPC_USERNAME:-supervisor}
      - SUPERVISOR_RPC_PASSWORD=${SUPERVISOR_RPC_PASSWORD:-supervisor-dev-password}
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome --no-zygote --renderer-process-limit=2 --disable-gpu --disable-features=CalculateNativeWinOcclusion --disable-gpu-memory-buffer-compositor-resources --disable-gpu-memory-buffer-video-frames --js-flags=--max-old-space-size=512
      - BROWSER_PATH=/opt/chrome-for-testing/chrome
      - LIBGL_ALWAYS_SOFTWARE=1
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]
    develop:
      watch:
        # Sandbox application code
        - action: sync
          path: ./sandbox/app
          target: /app/app
          ignore:
            - "**/__pycache__"
            - "**/*.pyc"
        # Sandbox scripts
        - action: sync
          path: ./sandbox/scripts
          target: /app/scripts
        # Supervisor config → sync + restart supervisor
        - action: sync+restart
          path: ./sandbox/supervisord.conf
          target: /etc/supervisor/conf.d/app.conf
        # Dependency changes → full rebuild
        - action: rebuild
          path: ./sandbox/requirements.txt
        - action: rebuild
          path: ./sandbox/requirements.runtime.txt

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-devuser}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-devpassword}
      - MINIO_SERVICE_USER=${MINIO_SERVICE_USER:-pythinker-svc}
      - MINIO_SERVICE_PASSWORD=${MINIO_SERVICE_PASSWORD:-pythinker-svc-secret-change-me}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 3 && \
        mc alias set myminio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" && \
        mc admin user add myminio "$${MINIO_SERVICE_USER}" "$${MINIO_SERVICE_PASSWORD}" 2>/dev/null || true && \
        mc admin policy attach myminio readwrite --user "$${MINIO_SERVICE_USER}" 2>/dev/null || true && \
        echo "MinIO service user '$$MINIO_SERVICE_USER' ready with readwrite policy"
    networks:
      - pythinker-network
    restart: "no"

  mongodb:
    image: mongo:7.0.28
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USERNAME:-pythinker_admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-pythinker_admin_password_change_me}
    mem_limit: 512m
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - pythinker-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "mongosh --norc --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.runCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8.4-alpine
    mem_limit: 512m
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "yes"
      - --loglevel
      - warning
      - --timeout
      - "0"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lfu}
      - --lazyfree-lazy-eviction
      - "yes"
      - --latency-monitor-threshold
      - "100"
    volumes:
      - redis_runtime_data:/data
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      # OrbStack: exec-based health checks hang; service responds fine on port 6379
      test: ["NONE"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-devuser}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-devpassword}
      - MINIO_IDENTITY_OPENID_ENABLE=off
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    mem_limit: 1g
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["NONE"]

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  redis_runtime_data:
    name: pythinker-redis-runtime-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data
  dspy_cache:
    name: pythinker-dspy-cache

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
