services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src  # Mount only source code
      - ./frontend/public:/app/public  # Mount public assets
      - ./frontend/index.html:/app/index.html  # Mount index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts  # Mount vite config
      - ./frontend/tsconfig.json:/app/tsconfig.json  # Mount tsconfig
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json  # Mount tsconfig app
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json  # Mount tsconfig node
      - ./frontend/env.d.ts:/app/env.d.ts  # Mount env types
    ports:
      - "5174:5174"  # Vite default development port
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - BACKEND_URL=http://backend:8000
      - VITE_USE_POLLING=true
      - VITE_POLLING_INTERVAL=100
      - VITE_LIVE_RENDERER=${LIVE_RENDERER:-cdp}
    depends_on:
      backend:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./dev.sh"]  # Start in reload mode
    volumes:
      - ./backend:/app  # Mount source code directory
      #- ./mcp.json:/etc/mcp.json # Mount MCP servers directory
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
      qdrant:
        condition: service_healthy
        required: true
      minio:
        condition: service_healthy
        required: true
    restart: unless-stopped
    networks:
      - pythinker-network
    env_file:
      - .env
    environment:
      - SANDBOX_LIFECYCLE_MODE=static
      - SANDBOX_ADDRESS=sandbox
      - SANDBOX_IMAGE=pythinker/pythinker-sandbox
      - SANDBOX_CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
      - "LOCAL_AUTH_PASSWORD=admin*123"  # Override .env to handle special chars
      - GRPC_ENABLE_FORK_SUPPORT=0  # Suppress gRPC fork warning from qdrant-client
      - NODE_OPTIONS=--no-deprecation  # Suppress Playwright url.parse() deprecation
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  sandbox:
    profiles:
      - static-sandbox
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml  # Openbox config for window management
      - /app/__pycache__  # Avoid overwriting cache files
      - /app/.venv  # Avoid overwriting virtual environment
    ports:
      #- "9222:9222"        # CDP port (internal use)
      #- "5902:5900"        # VNC native port (removed - using CDP screencast)
      #- "5901:5901"        # VNC WebSocket port (removed - using CDP screencast)
      - "8083:8080"         # Sandbox API
      - "8082:8082"         # Framework API
    # Shared memory for Chrome browser stability (512MB-1GB recommended for headless)
    shm_size: '1gb'
    # Temp filesystem - improves I/O performance for browser temp files
    tmpfs:
      - /run:size=50M,nosuid,nodev
      - /tmp:size=300M,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    # File descriptor limits for browser and node processes
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    # Resource limits optimized for 2 concurrent sandboxes
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
          pids: 300
        reservations:
          memory: 768M
    environment:
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  sandbox2:
    profiles:
      - static-sandbox
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    hostname: sandbox2
    volumes:
      - ./sandbox:/app  # Mount source code directory
      - ./sandbox/supervisord.conf:/etc/supervisor/conf.d/app.conf
      - ./sandbox/openbox-rc.xml:/home/ubuntu/.config/openbox/rc.xml
      - /app/__pycache__
      - /app/.venv
    ports:
      - "8084:8080"         # Sandbox API (different port)
      - "8085:8082"         # Framework API (different port)
    shm_size: '1gb'
    tmpfs:
      - /run:size=50M,nosuid,nodev
      - /tmp:size=300M,nosuid,nodev
      - /home/ubuntu/.cache:size=150M,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
          pids: 300
        reservations:
          memory: 768M
    environment:
      - UVI_ARGS="--reload"
      - FRAMEWORK_UVI_ARGS="--reload"
      - FRAMEWORK_DATABASE_URL=sqlite+aiosqlite:////home/ubuntu/.local/pythinker_sandbox.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox --disable-crashpad --user-data-dir=/tmp/chrome
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - pythinker-network

  redis:
    image: redis:8.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --loglevel
      - warning
      - --timeout
      - "0"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=pythinker
      - MINIO_ROOT_PASSWORD=pythinker123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: pythinker-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (2x faster)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - pythinker-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    name: pythinker-mongodb-data
  qdrant_data:
    name: pythinker-qdrant-data
  minio_data:
    name: pythinker-minio-data

networks:
  pythinker-network:
    name: pythinker-network
    driver: bridge
